<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JARVIS | Coffee Break TCG</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Rubik+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/jarvis.css?v=jarvis-chief-of-staff-v1-20260618" />
  </head>
  <body>
    <main class="jarvis-shell">
      <div class="oauth-alert" data-oauth-alert hidden></div>
      <section class="login-panel" data-login-panel>
        <p class="eyebrow">Coffee Break TCG private</p>
        <h1>JARVIS</h1>
        <p class="login-copy">Assistant exécutif IA pour décider ce que Max doit faire maintenant.</p>
        <form class="login-form" data-login-form>
          <label>
            Courriel
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            Mot de passe
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Entrer dans Jarvis</button>
          <p class="form-message" data-login-message></p>
        </form>
      </section>

      <section class="assistant-panel" data-app-panel hidden>
        <header class="jarvis-header">
          <div>
            <h1 data-greeting>Bonjour Max</h1>
          </div>
          <div class="header-actions">
            <button type="button" data-refresh>Rafraîchir</button>
            <button type="button" class="ghost" data-logout>Déconnexion</button>
          </div>
        </header>

        <section class="command-hero">
          <div>
            <p class="eyebrow">Aujourd’hui</p>
            <div class="today-summary" data-today-summary>Préparation du briefing...</div>
          </div>
          <div class="admin-time">
            <span>Temps estimé pour vider l’administratif</span>
            <strong data-admin-time>...</strong>
          </div>
        </section>

        <section class="action-stack" aria-label="Priorités Jarvis">
          <article class="primary-action" data-action-card="now"></article>
          <article class="secondary-action" data-action-card="next"></article>
          <article class="secondary-action" data-action-card="later"></article>
        </section>

        <section class="quiet-panels" aria-label="Détails Jarvis">
          <details>
            <summary>Emails</summary>
            <div class="panel-body">
              <div class="gmail-controls">
                <button type="button" data-connect-gmail="business">Connecter Gmail business</button>
                <button type="button" data-connect-gmail="personal">Connecter Gmail personnel</button>
                <button type="button" class="ghost-dark" data-sync-gmail>Importer les emails récents</button>
              </div>
              <div class="integration-state" data-gmail-state></div>
              <div class="email-list" data-email-list></div>
            </div>
          </details>

          <details>
            <summary>Calendrier</summary>
            <div class="panel-body">
              <div class="gmail-controls">
                <button type="button" data-connect-calendar>Connecter Google Calendar</button>
                <button type="button" class="ghost-dark" data-sync-calendar>Importer les 7 prochains jours</button>
              </div>
              <div class="integration-state" data-calendar-state></div>
              <div class="compact-list" data-event-list></div>
            </div>
          </details>

          <details>
            <summary>Croissance</summary>
            <div class="panel-body">
              <div class="growth-score" data-growth-score></div>
              <div class="focus-list" data-priority-list></div>
            </div>
          </details>

          <details>
            <summary>Mode apprentissage</summary>
            <div class="panel-body">
              <div class="learning-head">
                <p class="feedback-counter" data-feedback-count>0 correction</p>
              </div>
              <div class="email-filter-row" data-email-filters>
                <button type="button" class="active" data-email-filter="all">Tous</button>
                <button type="button" data-email-filter="Critique">Critique</button>
                <button type="button" data-email-filter="Important">Important</button>
                <button type="button" data-email-filter="À suivre">À suivre</button>
                <button type="button" data-email-filter="Traité">Traité</button>
                <button type="button" data-email-filter="Ignoré">Ignoré</button>
                <button type="button" data-email-filter="Business">Business</button>
                <button type="button" data-email-filter="Personnel">Personnel</button>
              </div>
              <div class="email-review-list" data-email-review-list></div>
            </div>
          </details>

          <details>
            <summary>Mode technique</summary>
            <div class="panel-body">
              <div class="gmail-controls diagnostic-actions">
                <button type="button" class="ghost-dark" data-test-openai>Tester connexion OpenAI</button>
                <button type="button" class="ghost-dark" data-test-gmail>Tester Gmail</button>
                <button type="button" class="ghost-dark" data-test-calendar>Tester Calendar</button>
                <button type="button" data-test-briefing>Générer briefing test</button>
                <button type="button" class="ghost-dark" data-reimport-all>Tout réimporter</button>
              </div>
              <div class="diagnostic-grid" data-diagnostic-grid></div>
              <div class="diagnostic-errors" data-diagnostic-errors></div>
              <div class="test-results" data-test-results></div>
              <div class="test-briefing" data-test-briefing-output hidden></div>
            </div>
          </details>
        </section>
      </section>
    </main>

    <script src="/jarvis.js?v=jarvis-chief-of-staff-v1-20260618" defer></script>
  </body>
</html>
