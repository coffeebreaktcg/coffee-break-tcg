<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coffee Break TCG | Prévisualisation mobile</title>
    <style>
      :root {
        --clay: #c9652f;
        --cream: #fcf1df;
        --paper: #fff8ea;
        --coffee: #3d2a1d;
        --muted: #806452;
        --line: #edd4b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--cream);
        color: var(--coffee);
        font-family: Inter, system-ui, sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(252, 241, 223, 0.92);
        padding: 18px 28px;
        backdrop-filter: blur(16px);
      }

      h1 {
        margin: 0;
        color: var(--clay);
        font-size: clamp(28px, 4vw, 54px);
        line-height: 0.95;
        text-transform: uppercase;
      }

      p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      main {
        display: flex;
        gap: 28px;
        align-items: flex-start;
        overflow-x: auto;
        padding: 28px;
      }

      .device {
        flex: 0 0 auto;
      }

      .device h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .device p {
        margin: 0 0 14px;
        font-size: 13px;
      }

      .frame {
        overflow: hidden;
        border: 10px solid #211812;
        border-radius: 34px;
        background: #111;
        box-shadow: 0 24px 60px rgba(61, 42, 29, 0.24);
      }

      iframe {
        display: block;
        border: 0;
        background: var(--paper);
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Prévisualisation mobile</h1>
        <p>Les cadres ci-dessous montrent le site dans des largeurs mobiles courantes.</p>
      </div>
    </header>
    <main>
      <section class="device">
        <h2>iPhone 13 / 14</h2>
        <p>390 x 844 px</p>
        <div class="frame">
          <iframe src="/?fresh=mobile-390" width="390" height="844" title="Aperçu mobile 390 x 844"></iframe>
        </div>
      </section>
      <section class="device">
        <h2>iPhone Pro Max</h2>
        <p>430 x 932 px</p>
        <div class="frame">
          <iframe src="/?fresh=mobile-430" width="430" height="932" title="Aperçu mobile 430 x 932"></iframe>
        </div>
      </section>
      <section class="device">
        <h2>Android compact</h2>
        <p>360 x 800 px</p>
        <div class="frame">
          <iframe src="/?fresh=mobile-360" width="360" height="800" title="Aperçu mobile 360 x 800"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
